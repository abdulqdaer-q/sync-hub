# Deploy Supabase migrations and edge functions to production (main only).
#
# Required secrets (GitHub Actions production deploy — not for developer laptops):
#   SUPABASE_ACCESS_TOKEN
#   SUPABASE_PROJECT_REF
# Optional:
#   SUPABASE_DB_PASSWORD
#
# Issue #58: only GHA should write to production Supabase. See docs/supabase-ci-deploy.md

name: Deploy Supabase (production)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "scripts/deploy-supabase-remote.sh"
      - "scripts/list-supabase-edge-functions.mjs"
      - ".github/workflows/deploy-supabase-production.yml"

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Migrations and edge functions
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Validate production Supabase secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] && missing+=("SUPABASE_ACCESS_TOKEN")
          [ -z "${SUPABASE_PROJECT_REF:-}" ] && missing+=("SUPABASE_PROJECT_REF")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing secrets: %s\n' "${missing[*]}"
            printf 'Production deploy is CI-only. See docs/supabase-ci-deploy.md\n'
            exit 1
          fi

      - name: Deploy to production Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: bash scripts/deploy-supabase-remote.sh
